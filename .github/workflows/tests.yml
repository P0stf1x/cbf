name: CI

on:
  - push
  - pull_request

jobs:
  release-build:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-26
          - windows-2025

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - run: cmake -B build

      - run: cmake --build build

      - uses: actions/upload-artifact@v7
        with:
          name: build-${{ matrix.os }}
          path: build
          if-no-files-found: error

  blackbox-test:
    needs: release-build
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-26
          - windows-2025

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          name: build-${{ matrix.os }}
          path: build

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install test dependencies
        run: python -m pip install --upgrade pip pytest

      - name: Test
        run: pytest tests/test_calculator.py -v
